name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------- TypeScript / Next.js side ----------
  typescript:
    name: TypeScript (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo run lint

      - name: Typecheck
        run: npx turbo run typecheck

      - name: Test
        run: npx turbo run test

      - name: Build
        run: npx turbo run build

  # ---------- Python engine side ----------
  engine:
    name: Engine (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (typecheck)
        run: mypy .

      - name: Pytest (test)
        run: pytest
